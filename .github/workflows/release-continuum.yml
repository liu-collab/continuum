name: release-continuum

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish @jiankarlin/continuum to npm"
        required: false
        default: "false"
      create_plugin_bundle:
        description: "Build Claude plugin zip bundle"
        required: false
        default: "true"
  push:
    tags:
      - "continuum-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        working-directory: packages/continuum-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/continuum-cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        if: github.event_name == 'push'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.ref_name }}"
          EXPECTED_TAG="continuum-v${PACKAGE_VERSION}"
          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "Tag $TAG does not match package version $PACKAGE_VERSION. Expected $EXPECTED_TAG."
            exit 1
          fi

      - name: Verify release bundle
        run: npm run release:verify

      - name: Build Claude plugin bundle
        if: github.event_name == 'push' || inputs.create_plugin_bundle == 'true'
        run: npm run package:claude-plugin

      - name: Upload Claude plugin artifact
        if: github.event_name == 'push' || inputs.create_plugin_bundle == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: continuum-claude-plugin
          path: packages/continuum-cli/dist/release/*.zip

      - name: Publish npm package
        if: github.event_name == 'push' || inputs.publish_npm == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
