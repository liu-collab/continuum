<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="64%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="62%" stop-color="#f3f7fb" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </radialGradient>
    <linearGradient id="ring" x1="16" y1="16" x2="50" y2="49" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="trace" x1="18" y1="24" x2="49" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <linearGradient id="orbit-a" x1="22" y1="22" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="orbit-b" x1="24" y1="26" x2="44" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#cbd5e1" flood-opacity="0.3" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="32" cy="32" r="23.5" fill="url(#halo)">
      <animate attributeName="opacity" values="0.94;1;0.94" dur="4.8s" repeatCount="indefinite" />
    </circle>
  </g>

  <circle cx="32" cy="32" r="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.82" stroke-width="1" />

  <g transform="translate(34 34)">
    <g transform="rotate(-18)">
      <ellipse
        cx="0"
        cy="0"
        rx="19.5"
        ry="10.2"
        fill="none"
        stroke="#60a5fa"
        stroke-opacity="0.16"
        stroke-width="1.15"
      />
      <g>
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 0 0"
          to="360 0 0"
          dur="11.5s"
          repeatCount="indefinite"
        />
        <ellipse
          cx="0"
          cy="0"
          rx="19.5"
          ry="10.2"
          fill="none"
          stroke="url(#ring)"
          stroke-width="4.8"
          stroke-linecap="round"
          pathLength="100"
          stroke-dasharray="42 58"
          stroke-dashoffset="12"
        />
      </g>
    </g>

    <g transform="rotate(67)">
      <ellipse
        cx="0"
        cy="0"
        rx="18.2"
        ry="7.4"
        fill="none"
        stroke="#2dd4bf"
        stroke-opacity="0.15"
        stroke-width="1.05"
      />
      <g>
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 0 0"
          to="-360 0 0"
          dur="14s"
          repeatCount="indefinite"
        />
        <ellipse
          cx="0"
          cy="0"
          rx="18.2"
          ry="7.4"
          fill="none"
          stroke="url(#trace)"
          stroke-width="3"
          stroke-linecap="round"
          opacity="0.96"
          pathLength="100"
          stroke-dasharray="34 66"
          stroke-dashoffset="54"
        />
      </g>
    </g>

    <g opacity="0.98">
      <g transform="rotate(18)">
        <ellipse
          cx="0"
          cy="0"
          rx="11.2"
          ry="6.2"
          fill="none"
          stroke="#38bdf8"
          stroke-opacity="0.13"
          stroke-width="0.95"
        />
        <g>
          <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 0 0"
            to="360 0 0"
            dur="8.2s"
            repeatCount="indefinite"
          />
          <ellipse
            cx="0"
            cy="0"
            rx="11.2"
            ry="6.2"
            fill="none"
            stroke="url(#orbit-a)"
            stroke-width="3.2"
            stroke-linecap="round"
            pathLength="100"
            stroke-dasharray="26 74"
            stroke-dashoffset="8"
          />
        </g>
      </g>

      <g transform="rotate(-43)">
        <ellipse
          cx="0"
          cy="0"
          rx="8.6"
          ry="4.1"
          fill="none"
          stroke="#14b8a6"
          stroke-opacity="0.12"
          stroke-width="0.9"
        />
        <g>
          <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 0 0"
            to="-360 0 0"
            dur="6.5s"
            repeatCount="indefinite"
          />
          <ellipse
            cx="0"
            cy="0"
            rx="8.6"
            ry="4.1"
            fill="none"
            stroke="url(#orbit-b)"
            stroke-width="2.7"
            stroke-linecap="round"
            opacity="0.96"
            pathLength="100"
            stroke-dasharray="22 78"
            stroke-dashoffset="48"
          />
        </g>
      </g>

      <g transform="rotate(71)">
        <ellipse
          cx="0"
          cy="0"
          rx="5.9"
          ry="2.7"
          fill="none"
          stroke="#22d3ee"
          stroke-opacity="0.11"
          stroke-width="0.85"
        />
        <g>
          <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 0 0"
            to="360 0 0"
            dur="4.8s"
            repeatCount="indefinite"
          />
          <ellipse
            cx="0"
            cy="0"
            rx="5.9"
            ry="2.7"
            fill="none"
            stroke="url(#trace)"
            stroke-width="2.2"
            stroke-linecap="round"
            opacity="0.95"
            pathLength="100"
            stroke-dasharray="18 82"
            stroke-dashoffset="18"
          />
        </g>
      </g>
    </g>
  </g>

  <circle cx="34" cy="34" r="4.8" fill="url(#core)">
    <animate attributeName="r" values="4.6;5.2;4.6" dur="3.6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.92;1;0.92" dur="3.6s" repeatCount="indefinite" />
  </circle>

  <circle cx="34" cy="34" r="9.5" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5" />
</svg>
