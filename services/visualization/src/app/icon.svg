<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <path id="track1" d="M 54,32 A 22,8.5 -18 0 1 10,32 A 22,8.5 -18 0 1 54,32" fill="none" stroke="#0066cc" stroke-opacity="0.2" stroke-width="0.8"/>
  <path id="track2" d="M 49,32 A 17,6.2 35 0 1 15,32 A 17,6.2 35 0 1 49,32" fill="none" stroke="#8b5cf6" stroke-opacity="0.22" stroke-width="0.8"/>
  <path id="track3" d="M 43,32 A 11,4.5 -50 0 1 21,32 A 11,4.5 -50 0 1 43,32" fill="none" stroke="#f59e0b" stroke-opacity="0.26" stroke-width="0.8"/>

  <circle r="2.2" fill="#0066cc">
    <animateMotion dur="11s" repeatCount="indefinite"><mpath href="#track1"/></animateMotion>
  </circle>
  <circle r="1.9" fill="#8b5cf6">
    <animateMotion dur="8s" repeatCount="indefinite"><mpath href="#track2"/></animateMotion>
  </circle>
  <circle r="1.7" fill="#f59e0b">
    <animateMotion dur="6s" repeatCount="indefinite"><mpath href="#track3"/></animateMotion>
  </circle>

  <!-- ripple 1 -->
  <circle cx="32" cy="32" r="5" fill="none" stroke="#0066cc" stroke-opacity="0" stroke-width="1.2">
    <animate attributeName="r" values="5;12;5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.35;0;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- ripple 2 -->
  <circle cx="32" cy="32" r="5" fill="none" stroke="#0066cc" stroke-opacity="0" stroke-width="0.8">
    <animate attributeName="r" values="5;12;5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.25;0;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- center breathing -->
  <circle cx="32" cy="32" r="5.8" fill="#0066cc">
    <animate attributeName="r" values="4;6.5;4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;1;0.75" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
